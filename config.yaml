# ============================================================
# Daily Digest — Configuration
# ============================================================
# This file is the "personal data container." The skeleton code
# is the same for everyone; only this config changes per user.
# ============================================================

profile:
  name: Xinyu
  interests:
    - AI and machine learning (new models, research breakthroughs, industry
      moves, infrastructure, and the craft of building systems)
    - technology business (startup strategy, defensibility, platform shifts,
      when to build vs. buy, how products win or die)
    - software engineering as a craft (architecture, testing, building
      things from scratch to understand them)
    - semiconductor and hardware (GPU architecture, chip supply chains,
      geopolitics of compute)
    - science (physics, biology, genetics, climate — breakthroughs and
      things that change how we understand the world)
    - economics and policy (trade, labor markets, regulation, how
      technology reshapes industries and jobs)
    - culture worth experiencing (movies, books, live performances with
      real depth or craft — skip the blockbuster hype)
    - ideas that challenge assumptions or connect fields in unexpected ways
  background: >
    ML engineer based in California who builds algorithms from scratch to
    understand them deeply. Technically strong but reads broadly — wants to
    understand the world, not just the tech stack. Thinks critically about
    moats, incentives, and why systems work the way they do. Prefers
    substance over hype. Don't dumb things down, but don't make everything
    about ML either.
  location: Santa Clara, California

sources:
  nyt:
    type: rss
    feeds:
      - section: Technology
        url: "https://rss.nytimes.com/services/xml/rss/nyt/Technology.xml"
      - section: Business
        url: "https://rss.nytimes.com/services/xml/rss/nyt/Business.xml"
      - section: Arts
        url: "https://rss.nytimes.com/services/xml/rss/nyt/Arts.xml"
      - section: Top Stories
        url: "https://rss.nytimes.com/services/xml/rss/nyt/HomePage.xml"
  hn:
    type: rss
    feeds:
      - section: Best Stories
        url: "https://hnrss.org/best"
      - section: Best Comments
        url: "https://hnrss.org/bestcomments"
  reddit:
    type: rss
    feeds:
      - section: r/singularity
        url: "https://www.reddit.com/r/singularity/.rss"
      - section: r/TrueFilm
        url: "https://www.reddit.com/r/TrueFilm/.rss"
      - section: r/investing
        url: "https://www.reddit.com/r/investing/.rss"
      - section: r/philosophy
        url: "https://www.reddit.com/r/philosophy/.rss"

digest:
  target_read_time_minutes: 5
  max_items:
    read_in_depth: 4
    check_it_out: 3
    fyi: 8
  style: >
    Concise, no fluff. Technical when relevant. Don't dumb things down.
    Write like a sharp colleague giving a morning briefing, not a news anchor.

delivery:
  method: email
  smtp:
    host: "smtp.gmail.com"
    port: 587
    username: "${SMTP_USERNAME}"
    password: "${SMTP_PASSWORD}"
  from_address: "${SMTP_USERNAME}"
  to_address: "${DIGEST_TO_EMAIL}"
  schedule: "0 8 * * *"
  timezone: "America/Los_Angeles"

llm:
  provider: anthropic
  model: "claude-sonnet-4-6"
  api_key: "${ANTHROPIC_API_KEY}"
